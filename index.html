<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fart Machine</title>
<style>
    /* ====== R1 screen: 240 x 282 portrait ====== */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
    }

    html, body {
        width: 240px;
        height: 282px;
        overflow: hidden;
        background: #1A1512;
        font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif;
        color: #FFF3E4;
    }

    #app {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        padding: 10px 8px 12px;
        position: relative;
        cursor: pointer;
    }

    /* ====== Header ====== */
    .title {
        font-size: 15px;
        letter-spacing: 2px;
        color: #FF4F00; /* rabbit orange */
        text-shadow: 0 0 8px rgba(255, 79, 0, 0.4);
        font-weight: bold;
    }

    /* ====== Rabbit stage ====== */
    .stage {
        position: relative;
        width: 170px;
        height: 170px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* Idle rabbit (shown when not farting) */
    #rabbitIdle {
        font-size: 90px;
        line-height: 1;
        transition: transform 0.08s ease-out;
    }

    /* Squish on press — hardware-accelerated transform only */
    #app.pressed #rabbitIdle {
        transform: scale(1.1, 0.85);
    }

    /* Animated fart gif (hidden until triggered) */
    #rabbitGif {
        position: absolute;
        top: 0;
        left: 0;
        width: 170px;
        height: 170px;
        object-fit: contain;
        display: none;
    }

    /* Custom idle image — identical box to the fart gif so the
       two line up perfectly when they swap */
    #rabbitIdle img {
        width: 170px;
        height: 170px;
        object-fit: contain;
        display: block;
    }

    /* Green stink puff — pure CSS, works even before you add the gif */
    .puff {
        position: absolute;
        bottom: 18px;
        right: 6px;
        width: 46px;
        height: 46px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(154, 205, 50, 0.9) 0%, rgba(107, 142, 35, 0.5) 60%, transparent 100%);
        opacity: 0;
        transform: scale(0.2) translate(0, 0);
        pointer-events: none;
    }

    .puff.go {
        animation: puffOut 1.1s ease-out forwards;
    }

    @keyframes puffOut {
        0%   { opacity: 0.95; transform: scale(0.2) translate(0, 0); }
        60%  { opacity: 0.6;  transform: scale(1.4) translate(18px, -22px); }
        100% { opacity: 0;    transform: scale(2.2) translate(30px, -48px); }
    }

    /* ====== Sound selector (scroll wheel) ====== */
    .selector {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        letter-spacing: 1px;
        color: #FFF3E4;
        background: rgba(255, 79, 0, 0.12);
        border: 1px solid rgba(255, 79, 0, 0.4);
        border-radius: 10px;
        padding: 3px 10px;
        max-width: 220px;
        white-space: nowrap;
        overflow: hidden;
    }

    .selector .arrow {
        color: #FF4F00;
        font-size: 9px;
    }

    #soundName {
        font-weight: bold;
        transition: opacity 0.12s ease-out;
    }

    #soundName.swap {
        opacity: 0;
    }

    /* ====== Footer ====== */
    .hint {
        font-size: 11px;
        color: #B79B82;
        text-align: center;
        letter-spacing: 1px;
    }

    .hint .key {
        color: #FF4F00;
        font-weight: bold;
    }

    /* Whole-screen flash on toot */
    #app.tooting {
        animation: flash 0.3s ease-out;
    }

    @keyframes flash {
        0%   { background: rgba(154, 205, 50, 0.12); }
        100% { background: transparent; }
    }

    @media (prefers-reduced-motion: reduce) {
        .puff.go, #app.tooting { animation: none; }
    }

    /* ====== Settings gear ====== */
    #gearBtn {
        position: absolute;
        top: 6px;
        right: 6px;
        width: 26px;
        height: 26px;
        border: none;
        border-radius: 50%;
        background: rgba(255, 79, 0, 0.15);
        color: #FF4F00;
        font-size: 14px;
        line-height: 26px;
        text-align: center;
        padding: 0;
        cursor: pointer;
        z-index: 5;
    }

    /* ====== Overlays (settings + countdown) ====== */
    .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 240px;
        height: 282px;
        background: #1A1512;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        z-index: 10;
    }

    .overlay.open {
        display: flex;
    }

    .overlay h2 {
        font-size: 14px;
        letter-spacing: 2px;
        color: #FF4F00;
    }

    .delay-row {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .delay-row button {
        width: 40px;
        height: 40px;
        border: 1px solid rgba(255, 79, 0, 0.5);
        border-radius: 10px;
        background: rgba(255, 79, 0, 0.12);
        color: #FF4F00;
        font-size: 20px;
        font-weight: bold;
        cursor: pointer;
    }

    #delayValue {
        font-size: 26px;
        font-weight: bold;
        color: #FFF3E4;
        min-width: 70px;
        text-align: center;
    }

    .overlay .sub {
        font-size: 10px;
        color: #B79B82;
        letter-spacing: 1px;
        text-align: center;
    }

    .overlay-btn {
        width: 150px;
        padding: 8px 0;
        border: none;
        border-radius: 12px;
        font-size: 13px;
        font-weight: bold;
        letter-spacing: 2px;
        cursor: pointer;
    }

    #armBtn {
        background: #FF4F00;
        color: #1A1512;
    }

    #closeSettingsBtn {
        background: rgba(255, 243, 228, 0.12);
        color: #FFF3E4;
    }

    /* Countdown display — dim for stealth */
    #countdownOverlay {
        background: #0D0B09;
    }

    #countdownNum {
        font-size: 64px;
        font-weight: bold;
        color: rgba(255, 79, 0, 0.45);
    }

    #countdownNum.imminent {
        color: rgba(154, 205, 50, 0.8);
    }
</style>
</head>
<body>
<div id="app">
    <button id="gearBtn" aria-label="Timer settings">&#9881;</button>

    <div class="overlay" id="settingsOverlay">
        <h2>DELAY TIMER</h2>
        <div class="delay-row">
            <button id="delayMinus">&#8722;</button>
            <div id="delayValue">10s</div>
            <button id="delayPlus">+</button>
        </div>
        <div class="sub">SCROLL WHEEL ALSO ADJUSTS<br>TOOT FIRES WHEN TIME IS UP</div>
        <button class="overlay-btn" id="armBtn">ARM TIMER</button>
        <button class="overlay-btn" id="closeSettingsBtn">CLOSE</button>
    </div>

    <div class="overlay" id="countdownOverlay">
        <h2>ARMED</h2>
        <div id="countdownNum">10</div>
        <div class="sub">TAP or PTT TO CANCEL</div>
    </div>

    <div class="title">FART MACHINE</div>

    <div class="stage">
        <div id="rabbitIdle">🐰</div>
        <img id="rabbitGif" src="rabbit-fart.gif" alt="">
        <div class="puff" id="puff1"></div>
        <div class="puff" id="puff2" style="bottom: 30px; right: 20px;"></div>
    </div>

    <div class="selector">
        <span class="arrow">&#9650;&#9660;</span>
        <span id="soundName">RANDOM</span>
    </div>

    <div class="hint">TAP or <span class="key">PTT</span> TO TOOT &middot; SCROLL TO PICK<br>LONG-PRESS PTT TO QUIT</div>
</div>

<script>
// ============================================================
// SOUND SETUP — add your .wav files here!
//
// 1. Put your .wav files in a folder called "sounds" next to
//    this index.html  (e.g. sounds/fart1.wav)
// 2. Add each filename to the FART_SOUNDS array below.
//    That's it — the machine picks one at random every toot.
// ============================================================
const FART_SOUNDS = [
    'sounds/fart1.wav',  
    'sounds/fart2.wav',  
    'sounds/fart3.wav',  
    'sounds/fart4.wav',  
    'sounds/fart5.wav',  
    'sounds/fart6.wav',  
    'sounds/fart7.wav',  
    'sounds/fart8.wav',  
    'sounds/fart9.wav',  
    'sounds/fart10.wav',  
    'sounds/fart11.wav'   
    // 'sounds/mega-ripper.wav',   <-- just add more lines like this
];

// How long the animated gif stays on screen per toot (ms).
// Match this roughly to the length of one loop of rabbit-fart.gif.
const GIF_DURATION_MS = 1500;

// ============================================================
// IMAGE SETUP
//
// GIF_FILE: your animated fart gif. Name your file to match,
//   or change this constant — it's the only place the filename
//   lives now.
//
// IDLE_IMAGE: optional. If you have a static "resting rabbit"
//   image, put its filename here (e.g. 'rabbit-idle.png') and
//   it replaces the 🐰 emoji. Leave it '' to keep the emoji.
// ============================================================
const GIF_FILE = 'rabbit-fart.gif';
const IDLE_IMAGE = 'rabbit-fart.png';   // e.g. 'rabbit-idle.png'

// Preload the gif at startup so the very first toot doesn't
// wait on a disk read/decode
const gifPreload = new Image();
gifPreload.src = GIF_FILE;

// Swap in the custom idle image if one is configured
// (sizing comes from the #rabbitIdle img CSS rule — same
// 170x170 box as the fart gif, so they swap seamlessly)
if (IDLE_IMAGE) {
    const idleEl = document.getElementById('rabbitIdle');
    idleEl.innerHTML = '<img src="' + IDLE_IMAGE + '" alt="">';
    idleEl.style.fontSize = '0'; // neutralize the emoji font sizing
}

// ------------------------------------------------------------
// Preload audio so playback is instant on the R1's slow hardware
// ------------------------------------------------------------
const audioPool = FART_SOUNDS.map(src => {
    const a = new Audio(src);
    a.preload = 'auto';
    return a;
});

let lastIndex = -1;
let gifTimer = null;

// ------------------------------------------------------------
// Scroll-wheel sound selector
// selectedIndex = -1 means RANDOM; 0..n-1 picks a specific sound.
// Names are derived from the filenames automatically, so new
// sounds added to FART_SOUNDS show up in the selector with no
// extra work ("sounds/mega-ripper.wav" -> "MEGA RIPPER").
// ------------------------------------------------------------
let selectedIndex = -1; // start on RANDOM

function soundLabel(i) {
    if (i === -1) return 'RANDOM';
    return FART_SOUNDS[i]
        .split('/').pop()          // strip folder
        .replace(/\.[^.]+$/, '')   // strip extension
        .replace(/[-_]+/g, ' ')    // dashes/underscores -> spaces
        .toUpperCase();
}

function updateSelectorDisplay() {
    const el = document.getElementById('soundName');
    el.classList.add('swap');
    setTimeout(() => {
        el.textContent = soundLabel(selectedIndex);
        el.classList.remove('swap');
    }, 120);
}

function cycleSound(direction) {
    // Don't change tracks mid-Grand Finale
    if (symphonyPlaying) return;

    // Cycle through: RANDOM (-1), 0, 1, ... n-1, back to RANDOM
    const total = audioPool.length + 1;
    selectedIndex = ((selectedIndex + 1 + direction) % total + total) % total - 1;
    updateSelectorDisplay();

    // Preview the selected sound so you know what you picked
    if (selectedIndex >= 0) {
        const s = audioPool[selectedIndex];
        s.currentTime = 0;
        s.play().catch(err => console.log('Could not preview sound:', err));
    }
}

function pickSound() {
    if (audioPool.length === 0) return null;

    // Specific sound chosen via scroll wheel
    if (selectedIndex >= 0) return audioPool[selectedIndex];

    // RANDOM mode
    if (audioPool.length === 1) return audioPool[0];
    // Avoid playing the same sound twice in a row
    let i;
    do {
        i = Math.floor(Math.random() * audioPool.length);
    } while (i === lastIndex);
    lastIndex = i;
    return audioPool[i];
}

// ------------------------------------------------------------
// EASTER EGG: double-click PTT plays the Grand Finale —
// every sound in the list, back to back.
// Per the SDK, a double click arrives as two sideClick events
// ~50ms apart, so we detect two clicks within DOUBLE_CLICK_MS.
// ------------------------------------------------------------
const DOUBLE_CLICK_MS = 350;
let lastSideClickTime = 0;
let symphonyPlaying = false;

function playSymphony() {
    if (symphonyPlaying || audioPool.length === 0) return;
    symphonyPlaying = true;

    // Stop anything currently playing
    audioPool.forEach(a => { a.pause(); a.currentTime = 0; });

    // Show the gif for the whole performance
    const gif = document.getElementById('rabbitGif');
    const idle = document.getElementById('rabbitIdle');
    clearTimeout(gifTimer);
    gif.src = GIF_FILE + '?t=' + Date.now();
    gif.style.display = 'block';
    idle.style.visibility = 'hidden';

    // Announce the finale in the selector pill
    const nameEl = document.getElementById('soundName');
    nameEl.textContent = 'GRAND FINALE!';

    let i = 0;
    const playNext = () => {
        if (i >= audioPool.length) {
            endSymphony();
            return;
        }
        const s = audioPool[i];
        i++;

        // Puff + flash for every toot in the medley
        restartPuff('puff1', 0);
        restartPuff('puff2', 120);
        const app = document.getElementById('app');
        app.classList.remove('tooting');
        void app.offsetWidth;
        app.classList.add('tooting');

        s.currentTime = 0;
        // Move on when this sound finishes (small gap for comic timing)
        s.addEventListener('ended', () => setTimeout(playNext, 200), { once: true });
        s.play().catch(err => {
            // Missing file — skip to the next one
            console.log('Symphony skip:', err);
            setTimeout(playNext, 200);
        });
    };

    const endSymphony = () => {
        symphonyPlaying = false;
        gif.style.display = 'none';
        idle.style.visibility = 'visible';
        nameEl.textContent = soundLabel(selectedIndex);
    };

    playNext();
}

// ------------------------------------------------------------
// DELAY TIMER — gear icon opens settings; arm it, hide the R1,
// and it toots when the countdown hits zero.
// ------------------------------------------------------------
const DELAY_PRESETS = [3, 5, 10, 15, 30, 60, 120, 300]; // seconds
let delayIndex = 2;        // default: 10s
let settingsOpen = false;
let timerActive = false;
let countdownRemaining = 0;
let countdownInterval = null;

function formatDelay(seconds) {
    if (seconds < 60) return seconds + 's';
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    return s === 0 ? m + 'm' : m + 'm ' + s + 's';
}

// Persist the chosen delay (creationStorage on the R1,
// localStorage fallback for browser testing)
async function saveDelaySetting() {
    const value = btoa(JSON.stringify({ delayIndex }));
    try {
        if (window.creationStorage) {
            await window.creationStorage.plain.setItem('fart_settings', value);
        } else {
            localStorage.setItem('fart_settings', value);
        }
    } catch (e) {
        console.log('Could not save settings:', e);
    }
}

async function loadDelaySetting() {
    try {
        let value = null;
        if (window.creationStorage) {
            value = await window.creationStorage.plain.getItem('fart_settings');
        } else {
            value = localStorage.getItem('fart_settings');
        }
        if (value) {
            const parsed = JSON.parse(atob(value));
            if (typeof parsed.delayIndex === 'number' &&
                parsed.delayIndex >= 0 && parsed.delayIndex < DELAY_PRESETS.length) {
                delayIndex = parsed.delayIndex;
            }
        }
    } catch (e) {
        console.log('Could not load settings:', e);
    }
    updateDelayDisplay();
}

function updateDelayDisplay() {
    document.getElementById('delayValue').textContent = formatDelay(DELAY_PRESETS[delayIndex]);
}

function adjustDelay(direction) {
    delayIndex = Math.min(DELAY_PRESETS.length - 1, Math.max(0, delayIndex + direction));
    updateDelayDisplay();
    saveDelaySetting();
}

function openSettings() {
    if (timerActive || symphonyPlaying) return;
    settingsOpen = true;
    document.getElementById('settingsOverlay').classList.add('open');
}

function closeSettings() {
    settingsOpen = false;
    document.getElementById('settingsOverlay').classList.remove('open');
}

function armTimer() {
    closeSettings();
    timerActive = true;
    countdownRemaining = DELAY_PRESETS[delayIndex];

    const overlay = document.getElementById('countdownOverlay');
    const num = document.getElementById('countdownNum');
    num.textContent = countdownRemaining;
    num.classList.remove('imminent');
    overlay.classList.add('open');

    countdownInterval = setInterval(() => {
        countdownRemaining--;
        num.textContent = countdownRemaining;
        if (countdownRemaining <= 3) num.classList.add('imminent');

        if (countdownRemaining <= 0) {
            clearInterval(countdownInterval);
            overlay.classList.remove('open');
            timerActive = false;
            toot(); // uses the scroll-selected sound (or RANDOM)
        }
    }, 1000);
}

function cancelTimer() {
    clearInterval(countdownInterval);
    timerActive = false;
    document.getElementById('countdownOverlay').classList.remove('open');
}

function toot() {
    // Don't interrupt the Grand Finale, settings, or an armed timer
    if (symphonyPlaying || settingsOpen || timerActive) return;

    // --- sound ---
    const sound = pickSound();
    if (sound) {
        sound.currentTime = 0;               // restart if already playing
        sound.play().catch(err => {
            // File missing or not yet added — fail silently (pun intended)
            console.log('Could not play sound:', err);
        });
    }

    // --- animated gif ---
    const gif = document.getElementById('rabbitGif');
    const idle = document.getElementById('rabbitIdle');

    // Re-setting src forces the gif to restart from frame 1
    gif.src = GIF_FILE + '?t=' + Date.now();
    gif.style.display = 'block';
    idle.style.visibility = 'hidden';

    clearTimeout(gifTimer);
    gifTimer = setTimeout(() => {
        gif.style.display = 'none';
        idle.style.visibility = 'visible';
    }, GIF_DURATION_MS);

    // --- CSS puff + flash ---
    restartPuff('puff1', 0);
    restartPuff('puff2', 120);

    const app = document.getElementById('app');
    app.classList.remove('tooting');
    void app.offsetWidth; // reflow to restart the flash animation
    app.classList.add('tooting');
}

function restartPuff(id, delay) {
    const el = document.getElementById(id);
    el.classList.remove('go');
    void el.offsetWidth; // force reflow so the animation can replay
    setTimeout(() => el.classList.add('go'), delay);
}

// ------------------------------------------------------------
// Triggers: screen tap + R1 side button (PTT)
// ------------------------------------------------------------
const app = document.getElementById('app');

// Screen tap — use pointerdown for the fastest response
app.addEventListener('pointerdown', (e) => {
    // Gear button, settings controls, and overlays handle themselves
    if (e.target.closest('#gearBtn') || e.target.closest('#settingsOverlay')) return;

    // Tap anywhere during the countdown = cancel
    if (timerActive) {
        cancelTimer();
        return;
    }

    app.classList.add('pressed');
    toot();
});
app.addEventListener('pointerup', () => app.classList.remove('pressed'));
app.addEventListener('pointercancel', () => app.classList.remove('pressed'));

// Settings controls
document.getElementById('gearBtn').addEventListener('click', openSettings);
document.getElementById('closeSettingsBtn').addEventListener('click', closeSettings);
document.getElementById('armBtn').addEventListener('click', armTimer);
document.getElementById('delayMinus').addEventListener('click', () => adjustDelay(-1));
document.getElementById('delayPlus').addEventListener('click', () => adjustDelay(1));

// Load the saved delay on startup
loadDelaySetting();

// R1 side button (PTT):
// single click = toot, double click = Grand Finale easter egg.
// First click toots instantly (no delay); if a second click lands
// within DOUBLE_CLICK_MS it upgrades into the full medley.
window.addEventListener('sideClick', () => {
    // PTT during the countdown = cancel
    if (timerActive) {
        cancelTimer();
        return;
    }
    if (settingsOpen) return;

    const now = Date.now();
    if (now - lastSideClickTime < DOUBLE_CLICK_MS) {
        lastSideClickTime = 0; // reset so a triple click doesn't retrigger
        playSymphony();
    } else {
        lastSideClickTime = now;
        toot();
    }
});

// Scroll wheel: adjusts the delay while settings are open,
// otherwise cycles through the sound list
window.addEventListener('scrollUp', () => {
    if (settingsOpen) { adjustDelay(1); return; }
    if (timerActive) return;
    cycleSound(-1);
});

window.addEventListener('scrollDown', () => {
    if (settingsOpen) { adjustDelay(-1); return; }
    if (timerActive) return;
    cycleSound(1);
});

// Long-press PTT quits back to the home screen
window.addEventListener('longPressStart', () => {
    if (typeof closeWebView !== 'undefined') {
        closeWebView.postMessage('');
    }
});
</script>
</body>
</html>
